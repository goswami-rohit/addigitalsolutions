server {
    listen 80;
    server_name 
        addigitalsolutions.in
        www.addigitalsolutions.in;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    location / {

        # Static HTML site
        try_files $uri $uri/ $uri.html =404;

    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }
}